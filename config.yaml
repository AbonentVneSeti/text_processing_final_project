dataset_source: "tapaco"
source_params:
  tapaco:
    language: "ru"
    pair_mode: "all_pairs"
    #file_path: "data/tapaco_ru.csv"   # если есть готовый файл
  backtranslation:
    input_file: "data/sentences.txt"
    from_lang: "ru"
    to_lang: "en"
    api: "googletrans"                # или "deep_translator"
  custom_merge:
    files: ["data/ds1.csv", "data/ds2.csv"]

preprocessing:
  steps:
    - remove_duplicates
    - normalize_text
    - filter_trivial_pairs
    - filter_by_length
    - filter_edit_distance
    - filter_semantic_similarity
  remove_duplicates: {}
  normalize_text:
    lower: true
    trim: true
    remove_brackets: true
  filter_trivial_pairs:
    min_edit_ratio: 0.18
    min_len: 6
    max_len: 50
  filter_by_length:
    max_tokens: 128
    tokenizer: "cointegrated/rut5-base"
  filter_edit_distance:
    min_edit_ratio: 0.1
    max_edit_ratio: 0.9
  filter_semantic_similarity:
    threshold: 0.80
    model: "sentence-transformers/LaBSE"
    batch_size: 32

model_name: "rut5_paraphraser"
model_config:
  pretrained_name: "cointegrated/rut5-base"
  max_length: 128
  batch_size: 16
  learning_rate: 3e-4
  num_epochs: 5
  warmup_steps: 200
  weight_decay: 0.01
  gradient_accumulation_steps: 1

trainer_config:
  output_dir: "models/rut5_paraphraser/saves"
  logging_strategy: "epoch"
  eval_strategy: "epoch"
  save_strategy: "epoch"
  save_total_limit: 10
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  fp16: true

metrics_config:
  metrics: ["bleu", "bertscore", "cosine_similarity"]
  bertscore_model: "cointegrated/rubert-tiny2"
  embedding_model: "sentence-transformers/LaBSE"
  batch_size: 16